<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-grid"></div>

    <div class="chat-container">
        <header>
            <div class="header-text">
                <div class="logo-mark">
                    <span class="logo-pulse"></span>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="4" fill="currentColor"/>
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.4" opacity="0.35"/>
                    </svg>
                </div>
                <h1 class="doto-logo">Lumen</h1>
                <p class="tagline">Your conversational assistant</p>
            </div>
        </header>

        <div id="chat-box" class="chat-box"></div>

        <div class="suggestions" id="suggestions">
            <button class="chip" data-prompt="Explain a complex topic simply">Explain a concept simply</button>
            <button class="chip" data-prompt="Help me write a professional email">Help me write an email</button>
            <button class="chip" data-prompt="Help me debug this code">Debug my code</button>
            <button class="chip" data-prompt="Brainstorm ideas for a project">Brainstorm ideas</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Message Lumen..."/>
            <button id="send-btn" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
